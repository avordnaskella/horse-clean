{% extends 'base.html' %}

{% block content %}
<h2>Удаление категории</h2>
<p>Вы уверены, что хотите удалить категорию "{{ object.name }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'module_project:category_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
